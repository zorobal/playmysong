<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayMySong - Maintenant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: white;
      overflow: hidden;
    }
    .container { 
      max-width: 1920px; 
      margin: 0 auto; 
      padding: 20px; 
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      margin-bottom: 15px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
    .establishment-name { font-size: 1.1rem; color: #e94560; }
    
    .main-content { 
      flex: 1; 
      display: flex; 
      gap: 20px; 
      overflow: hidden;
    }
    
    /* LEFT SIDE - Selfie and Message (BIG) */
    .client-display {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e94560 0%, #533483 100%);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(233,69,96,0.4);
      position: relative;
      overflow: hidden;
    }
    
    .selfie-container {
      width: 350px;
      height: 350px;
      border-radius: 50%;
      overflow: hidden;
      border: 8px solid white;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      margin-bottom: 30px;
      position: relative;
    }
    .selfie-container img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .selfie-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      font-size: 5rem;
    }
    
    .message-marquee {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 25px 40px;
      max-width: 100%;
      overflow: hidden;
      position: relative;
    }
    .message-text {
      font-size: 2.5rem;
      font-weight: bold;
      font-style: italic;
      color: #fbbf24;
      white-space: nowrap;
      animation: marquee 10s linear infinite;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .request-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #e94560;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: bold;
    }
    
    /* RIGHT SIDE - Song Info (SMALL) */
    .song-display {
      flex: 0.8;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      overflow: hidden;
    }
    
    .song-info-mini {
      text-align: center;
      margin-bottom: 15px;
    }
    .song-thumbnail-mini {
      width: 120px;
      height: 120px;
      border-radius: 15px;
      margin: 0 auto 15px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .song-thumbnail-mini img { width: 100%; height: 100%; object-fit: cover; }
    .song-title-mini { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
    .artist-mini { font-size: 1rem; opacity: 0.8; }
    
    .player-mini { 
      flex: 1; 
      position: relative;
      min-height: 200px;
    }
    .youtube-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .controls-mini { 
      text-align: center; 
      margin-top: 15px;
      flex-shrink: 0;
    }
    .controls-mini button {
      padding: 12px 30px;
      border-radius: 25px;
      border: none;
      background: #fbbf24;
      color: #1a1a2e;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    
    /* Queue */
    .queue-container {
      flex: 0.6;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 15px;
      overflow-y: auto;
      max-height: 100%;
    }
    .queue-container h3 { 
      font-size: 1.2rem; 
      margin-bottom: 15px; 
      color: #e94560; 
      text-align: center;
    }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .queue-thumb {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .queue-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .queue-number { font-size: 1rem; font-weight: bold; color: #e94560; min-width: 25px; }
    .queue-info { flex: 1; }
    .queue-title { font-size: 0.9rem; font-weight: 600; }
    .queue-artist { font-size: 0.75rem; opacity: 0.7; }
    .queue-empty { text-align: center; padding: 30px; opacity: 0.9; }
    
    /* Waiting Screen */
    .waiting-screen {
      flex: 1;
      text-align: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
      border-radius: 25px;
      border: 2px solid #e94560;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .waiting-icon {
      font-size: 6rem;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .waiting-title { font-size: 2.5rem; margin-bottom: 10px; font-weight: bold; }
    .waiting-subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 20px; }
    .waiting-est-name { 
      font-size: 1.5rem; 
      color: #e94560; 
      margin-bottom: 20px; 
      font-weight: bold;
    }
    .qr-box {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 15px;
      padding: 20px 30px;
      display: inline-block;
    }
    .qr-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .qr-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
    .qr-instruction { font-size: 0.9rem; opacity: 0.8; }
    
    .loading { text-align: center; padding: 50px; font-size: 1.5rem; opacity: 0.7; }
    
    /* Hide scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎵 PlayMySong</h1>
      <div class="establishment-name" id="establishmentName">Chargement...</div>
    </div>

    <div id="content">
      <div class="loading">Chargement...</div>
    </div>
  </div>

  <div id="youtubePlayerWrapper" style="display:none;">
    <div id="youtubePlayer"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const API_URL = 'https://playmysong-mu.vercel.app/api';
    const urlParams = new URLSearchParams(window.location.search);
    const establishmentId = urlParams.get('establishmentId') || 'cmmke5nms0001ik0424nh0517';

    // Auto-refresh every 3 seconds
    setInterval(() => {
      console.log('Auto-checking for updates...');
      checkForUpdates();
    }, 3000);
    
    async function checkForUpdates() {
      try {
        const res = await fetch(`${API_URL}/request/playlist/current?establishmentId=${establishmentId}`);
        const data = await res.json();
        
        if (data.nowPlaying && data.nowPlaying.id !== currentNowPlaying?.id) {
          console.log('New song to play:', data.nowPlaying.title);
          loadData();
        }
        
        if (data.queue && JSON.stringify(data.queue.map(q => q.id)) !== JSON.stringify(currentQueue.map(q => q.id))) {
          currentQueue = data.queue || [];
          updateQueueDisplay(currentQueue);
        }
      } catch (e) {
        console.error('Error checking updates:', e);
      }
    }

    let currentNowPlaying = null;
    let currentQueue = [];
    let establishmentPlaylist = [];
    let currentEstablishment = null;
    let currentPlaylistIndex = 0;
    let player = null;
    let isPlayerReady = false;
    let lastRenderedSongId = null;

    function onYouTubeIframeAPIReady() {
      console.log('YouTube API ready');
      isPlayerReady = true;
    }

    async function loadData() {
      try {
        const estRes = await fetch(`${API_URL}/establishments/${establishmentId}`);
        const establishment = await estRes.json();
        currentEstablishment = establishment;
        document.getElementById('establishmentName').textContent = establishment.name || 'Établissement';

        const playlistRes = await fetch(`${API_URL}/request/playlist/current?establishmentId=${establishmentId}`);
        const playlistData = await playlistRes.json();
        
        const nowPlaying = playlistData.nowPlaying;
        const queue = playlistData.queue || [];
        establishmentPlaylist = playlistData.establishmentPlaylist || [];
        
        let songToPlay = nowPlaying;
        
        if (!songToPlay && establishmentPlaylist.length > 0) {
          if (currentNowPlaying && currentNowPlaying.isPlaylistSong && currentNowPlaying.youtubeId) {
            const currentIdx = establishmentPlaylist.findIndex(s => s.youtubeId === currentNowPlaying.youtubeId);
            if (currentIdx >= 0) {
              currentPlaylistIndex = currentIdx;
              songToPlay = { ...establishmentPlaylist[currentIdx], isPlaylistSong: true };
            } else {
              currentPlaylistIndex = 0;
              songToPlay = { ...establishmentPlaylist[0], isPlaylistSong: true };
            }
          } else {
            currentPlaylistIndex = 0;
            songToPlay = { ...establishmentPlaylist[0], isPlaylistSong: true };
          }
        }
        
        currentQueue = queue;
        
        const songId = songToPlay?.id || songToPlay?.youtubeId || 'none';
        
        if (songId !== lastRenderedSongId) {
          console.log('Song changed, rendering:', songId);
          lastRenderedSongId = songId;
          currentNowPlaying = songToPlay;
          renderAll(establishment, songToPlay, queue);
          
          if (songToPlay?.youtubeId) {
            setTimeout(() => {
              initYouTubePlayer(songToPlay.youtubeId);
            }, 500);
          }
        } else if (songId === 'none' && lastRenderedSongId !== 'none') {
          lastRenderedSongId = 'none';
          renderAll(establishment, null, queue);
        }
        
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function initYouTubePlayer(videoId) {
      if (!videoId) return;
      
      if (player && player.getVideoData) {
        try {
          const currentVideo = player.getVideoData();
          if (currentVideo && currentVideo.video_id === videoId) {
            console.log('Same video already playing');
            if (player.getPlayerState() !== 1) {
              player.playVideo();
            }
            return;
          }
        } catch(e) {}
      }

      if (player) {
        try { player.destroy(); } catch(e) {}
        player = null;
      }

      const container = document.getElementById('youtubePlayer');
      if (!container) {
        console.log('Container not ready');
        return;
      }

      console.log('Creating player for:', videoId);
      
      player = new YT.Player('youtubePlayer', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        playerVars: { 
          autoplay: 1, 
          controls: 1, 
          modestbranding: 1, 
          rel: 0, 
          playsinline: 1,
          enablejsapi: 1
        },
        events: {
          onReady: function(event) {
            console.log('Player ready, starting video');
            event.target.mute();
            event.target.playVideo();
            startDurationCheck();
          },
          onStateChange: function(event) {
            console.log('Player state changed:', event.data);
            if (event.data === YT.PlayerState.PLAYING) {
              startDurationCheck();
              setTimeout(() => {
                if (player && player.unmute) {
                  player.unmute();
                }
              }, 3000);
            }
            if (event.data === YT.PlayerState.ENDED) {
              console.log('Video ended!');
              playNext();
            }
          },
          onError: function(event) {
            console.error('YouTube player error:', event.data);
            playNext();
          }
        }
      });
    }
    
    let durationCheckInterval = null;
    
    function startDurationCheck() {
      if (durationCheckInterval) {
        clearInterval(durationCheckInterval);
      }
      
      durationCheckInterval = setInterval(() => {
        if (player && player.getCurrentTime && player.getDuration) {
          try {
            const currentTime = player.getCurrentTime();
            const duration = player.getDuration();
            const state = player.getPlayerState();
            
            if (state === YT.PlayerState.PLAYING && duration > 0 && currentTime >= duration - 0.5) {
              console.log('Video duration check: near end, calling playNext');
              clearInterval(durationCheckInterval);
              playNext();
            }
          } catch(e) {}
        }
      }, 1000);
    }

    async function playNext() {
      console.log('playNext called');
      
      if (durationCheckInterval) {
        clearInterval(durationCheckInterval);
        durationCheckInterval = null;
      }
      
      if (currentNowPlaying && !currentNowPlaying.isPlaylistSong && currentNowPlaying.id) {
        console.log('Marking song as completed:', currentNowPlaying.id);
        try {
          await fetch(`${API_URL}/request/${currentNowPlaying.id}/complete`, { method: 'POST' });
        } catch(e) {
          console.error('Error marking as completed:', e);
        }
      }
      
      try {
        // Get establishment data for logo
        if (!currentEstablishment) {
          const estRes = await fetch(`${API_URL}/establishments/${establishmentId}`);
          currentEstablishment = await estRes.json();
        }
        
        const playlistRes = await fetch(`${API_URL}/request/playlist/current?establishmentId=${establishmentId}`);
        const playlistData = await playlistRes.json();
        
        const queue = playlistData.queue || [];
        establishmentPlaylist = playlistData.establishmentPlaylist || [];
        
        if (queue.length > 0) {
          const nextSong = queue[0];
          console.log('Playing queue song:', nextSong.title);
          
          await fetch(`${API_URL}/request/${nextSong.id}/play`, { method: 'POST' });
          
          currentNowPlaying = nextSong;
          currentQueue = queue;
          currentPlaylistIndex = 0;
          
          updateQueueDisplay(queue);
          updateNowPlayingDisplay(nextSong);
          
          initYouTubePlayer(nextSong.youtubeId);
        } 
        else if (establishmentPlaylist.length > 0) {
          let currentIdx = -1;
          if (currentNowPlaying && currentNowPlaying.youtubeId) {
            currentIdx = establishmentPlaylist.findIndex(s => s.youtubeId === currentNowPlaying.youtubeId);
          }
          
          let nextIdx = currentIdx >= 0 ? (currentIdx + 1) % establishmentPlaylist.length : 0;
          
          const nextSong = { ...establishmentPlaylist[nextIdx], isPlaylistSong: true };
          console.log('Playing playlist song:', nextSong.title, 'Index:', nextIdx);
          
          currentPlaylistIndex = nextIdx;
          currentNowPlaying = nextSong;
          currentQueue = [];
          
          lastRenderedSongId = null;
          renderAll(null, nextSong, []);
          
          setTimeout(() => {
            initYouTubePlayer(nextSong.youtubeId);
          }, 500);
        } else {
          console.log('No songs in queue or playlist');
          currentNowPlaying = null;
          lastRenderedSongId = 'none';
          renderAll(null, null, []);
        }
      } catch(e) {
        console.error('Error in playNext:', e);
      }
    }
    
    function updateNowPlayingDisplay(song) {
      // Update selfie and message display
      const selfieContainer = document.querySelector('.selfie-container');
      const messageMarquee = document.querySelector('.message-marquee');
      
      if (selfieContainer && song?.selfieUrl) {
        selfieContainer.innerHTML = `<img src="${song.selfieUrl}" alt="Selfie">`;
      }
      
      if (messageMarquee && song?.message) {
        messageMarquee.innerHTML = `<div class="message-text">"${escapeHtml(song.message)}"</div>`;
      }
    }

    async function skipSong() {
      await playNext();
    }

    function renderAll(establishment, nowPlaying, queue) {
      let html = '<div class="main-content">';
      
      const hasClientContent = nowPlaying && (nowPlaying.message || nowPlaying.selfieUrl);
      
      // LEFT SIDE - Client Display (Selfie + Message)
      if (hasClientContent) {
        const isRequest = !nowPlaying.isPlaylistSong;
        html += `
          <div class="client-display">
            ${isRequest ? '<div class="request-badge">📩 Demande Client</div>' : ''}
            <div class="selfie-container">
              ${nowPlaying.selfieUrl 
                ? `<img src="${nowPlaying.selfieUrl}" alt="Selfie">`
                : '<div class="selfie-placeholder">📸</div>'
              }
            </div>
            ${nowPlaying.message ? `
              <div class="message-marquee">
                <div class="message-text">"${escapeHtml(nowPlaying.message)}"</div>
              </div>
            ` : ''}
          </div>
        `;
      } else if (!nowPlaying) {
        // Waiting screen
        html += `
          <div class="waiting-screen">
            <div class="waiting-icon">🎵</div>
            <div class="waiting-title">En attente de demandes</div>
            <div class="waiting-subtitle">Proposez vos chansons préférées!</div>
            <div class="waiting-est-name">${establishment?.name || 'Établissement'}</div>
            <div class="qr-box">
              <div class="qr-icon">📱</div>
              <div class="qr-text">Scannez le QR Code</div>
              <div class="qr-instruction">pour proposer une chanson</div>
            </div>
          </div>
        `;
      } else {
        // Playlist playing - show establishment logo from database
        const logoUrl = currentEstablishment?.logoUrl;
        const playlistMsg = currentEstablishment?.playlistMessage || currentEstablishment?.name || 'Playlist Établissement';
        html += `
          <div class="client-display">
            <div class="request-badge">🎼 Playlist Établissement</div>
            <div class="selfie-container">
              ${logoUrl 
                ? `<img src="${logoUrl}" alt="Logo" style="width:100%;height:100%;object-fit:cover;">`
                : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;background:rgba(255,255,255,0.1);">🏪</div>`
              }
            </div>
            <div class="message-marquee">
              <div class="message-text">${escapeHtml(playlistMsg)}</div>
            </div>
          </div>
        `;
      }
      
      // MIDDLE - Song Info (SMALL)
      html += `
        <div class="song-display">
          <div class="song-info-mini">
            <div class="song-thumbnail-mini">
              ${nowPlaying?.thumbnail 
                ? `<img src="${escapeHtml(nowPlaying.thumbnail)}" alt="Thumbnail">`
                : '<div style="width:100%;height:100%;background:#333;display:flex;align-items:center;justify-content:center;">🎵</div>'
              }
            </div>
            <div class="song-title-mini">${escapeHtml(nowPlaying?.title || 'Aucune chanson')}</div>
            <div class="artist-mini">${escapeHtml(nowPlaying?.artist || 'Artiste inconnu')}</div>
          </div>
          <div class="player-mini">
            <div class="youtube-container">
              <div id="youtubePlayer"></div>
            </div>
          </div>
          <div class="controls-mini">
            <button onclick="skipSong()">⏭️ ${nowPlaying?.isPlaylistSong ? 'Suivante' : 'Terminer'}</button>
          </div>
        </div>
      `;
      
      // RIGHT - Queue
      html += `
        <div class="queue-container">
          <h3>📋 File d'attente (${queue.length})</h3>
          ${queue.length > 0 ? queue.map((item, index) => `
            <div class="queue-item">
              <div class="queue-number">${index + 1}</div>
              <div class="queue-thumb">
                ${item.thumbnail 
                  ? `<img src="${escapeHtml(item.thumbnail)}" alt="">`
                  : '<div style="width:100%;height:100%;background:#333;"></div>'
                }
              </div>
              <div class="queue-info">
                <div class="queue-title">${escapeHtml(item.title)}</div>
                <div class="queue-artist">${escapeHtml(item.artist || 'Artiste inconnu')}</div>
              </div>
            </div>
          `).join('') : `
            <div class="queue-empty">
              <p style="margin-bottom:10px;">Aucune demande en attente</p>
              <p style="font-size:0.9rem;opacity:0.8;">📱 Scannez le QR Code pour faire une demande!</p>
            </div>
          `}
        </div>
      `;
      
      html += '</div>';

      document.getElementById('content').innerHTML = html;
    }

    function updateQueueDisplay(queue) {
      const queueContainer = document.querySelector('.queue-container');
      if (!queueContainer) return;
      
      let html = `<h3>📋 File d'attente (${queue.length})</h3>`;
      
      if (queue.length > 0) {
        html += queue.map((item, index) => `
          <div class="queue-item">
            <div class="queue-number">${index + 1}</div>
            <div class="queue-thumb">
              ${item.thumbnail 
                ? `<img src="${escapeHtml(item.thumbnail)}" alt="">`
                : '<div style="width:100%;height:100%;background:#333;"></div>'
              }
            </div>
            <div class="queue-info">
              <div class="queue-title">${escapeHtml(item.title)}</div>
              <div class="queue-artist">${escapeHtml(item.artist || 'Artiste inconnu')}</div>
            </div>
          </div>
        `).join('');
      } else {
        html += `
          <div class="queue-empty">
            <p style="margin-bottom:10px;">Aucune demande en attente</p>
            <p style="font-size:0.9rem;opacity:0.8;">📱 Scannez le QR Code pour faire une demande!</p>
          </div>
        `;
      }
      
      queueContainer.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial load
    loadData();
  </script>
</body>
</html>
